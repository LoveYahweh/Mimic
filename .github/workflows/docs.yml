name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC site
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Generate documentation
        env:
          MIMIC_DOCC: "1"
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target Mimic \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path Mimic \
            --output-path ./docs
          # Redirect the site root to the generated documentation.
          echo '<!doctype html><meta http-equiv="refresh" content="0; url=documentation/mimic/">' > ./docs/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
